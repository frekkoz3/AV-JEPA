environment:
  environment : "Snake"
  n_environments: 1
  n_obstacles : 10
  max_step : 1000

  render_mode : "human"
  observation_type : "grid"

  difficulty : 2
  cell_size : 35
  grid_width : 20
  grid_height : 20
  resources_path : "./src/game/resources"
  fps : 10

  n_actions : 4
  reward_food: 20
  reward_death: -5
  reward_step: -0.5


policy:
  pol_type : "PolicyDQN"
  pol_network : "AttentionDQN"
  pol_loss: "MSELoss"
  pol_horizon : 1
  reward_discount : 0.995

  epsilon_strategy : "EpsilonGreedy"
  epsilon_start : 1.0
  epsilon_end : 0.1
  epsilon_coeff : 0.9995

  pol_input_dim : 400
  pol_output_dim : 4
  pol_num_attention_layer : 2
  pol_attention_layer_params : [{"pol_num_heads" : 4}, {"pol_num_heads" : 8}]
  pol_num_fc_layer : 2
  pol_dim_fc_layer : [16, 32]


training:
  device : "cpu"
  n_inner_epochs: 5
  n_trajectories: 10000

  batch_size: 128
  buffer_size: 20000

  optimizer : "Adam"
  lr_init : 0.05
  lr_scheduler : "StepLR"
  lr_step_size : 10
  lr_gamma : 0.05


save:
  checkpoint: 1000
  save_model: True
  save_path: "./models/raw-policies/attention-dqn/"


pretrain:
# network_model_path : "PUT-HERE-SOME-PATH.PT"